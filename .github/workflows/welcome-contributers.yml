# ─────────────────────────────────────────────────────────────────────────────
# Contributor Onboarding Workflow
# Handles: new PRs, first-time issues, and webhook-triggered org member joins
#
# Fixes applied:
#   - Added GOOD_FIRST_ISSUES to env (was missing, caused broken links)
#   - Fixed first-time PR check to paginate all PRs (not just last 10)
#   - Added concurrency control to prevent duplicate comments
#   - Added bot filter to skip Dependabot/Renovate/bots
#   - Added onboarding + welcome label auto-creation before use
#   - Added timeout-minutes on all jobs
#   - Replaced hardcoded repo references with ${{ github.repository }}
#   - Tightened permissions to minimum required per job
# ─────────────────────────────────────────────────────────────────────────────

name: 🎉 Contributor Onboarding

on:
  pull_request_target:
    types: [opened]

  issues:
    types: [opened]

  repository_dispatch:
    types: [member_added]

env:
  DISCORD_INVITE:     "https://discord.gg/MY_INVITE"
  CONTRIBUTING_GUIDE: "https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md"
  CODE_OF_CONDUCT:    "https://github.com/${{ github.repository }}/blob/main/CODE_OF_CONDUCT.md"
  CODING_STANDARDS:   "https://github.com/${{ github.repository }}/blob/main/docs/CODING_STANDARDS.md"
  DOCS_URL:           "https://www.notion.so/manara/AWS-Ramadan-Challenge-2fc2d7c1418c8048b59ef5d3cbc389a1"
  # FIX: was missing — caused broken links in welcome comments
  GOOD_FIRST_ISSUES:  "https://github.com/${{ github.repository }}/labels/good%20first%20issue"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Welcome First-Time PR Author ───────────────────────────────────
  welcome-new-pr-author:
    name: Welcome First-Time PR Author
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request_target'

    # FIX: tightened to minimum required permissions
    permissions:
      pull-requests: write
      issues:        write

    # FIX: prevents duplicate comments if workflow is re-triggered rapidly
    concurrency:
      group: welcome-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      # FIX: skip bots entirely — Dependabot, Renovate, etc.
      - name: Skip if author is a bot
        id: bot-check
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const isBot  = context.payload.pull_request.user.type === 'Bot'
                        || author.endsWith('[bot]')
                        || author === 'dependabot'
                        || author === 'renovate';
            if (isBot) {
              core.warning(`Skipping bot account: ${author}`);
            }
            core.setOutput('is_bot', isBot ? 'true' : 'false');

      # FIX: paginate ALL PRs instead of just last 10 to avoid false positives
      - name: Check if author is a first-time contributor
        id: check
        if: steps.bot-check.outputs.is_bot == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            let page = 1;
            let totalAuthorPRs = 0;

            while (true) {
              const { data: prs } = await github.rest.pulls.list({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                state:    'all',
                per_page: 100,
                page,
              });
              if (prs.length === 0) break;
              totalAuthorPRs += prs.filter(pr => pr.user.login === author).length;
              if (prs.length < 100) break;
              page++;
            }

            core.info(`Total PRs by @${author}: ${totalAuthorPRs}`);
            core.setOutput('is_first_pr', totalAuthorPRs === 1 ? 'true' : 'false');

      - name: Post first-time PR welcome comment
        if: |
          steps.bot-check.outputs.is_bot == 'false' &&
          steps.check.outputs.is_first_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author  = context.payload.pull_request.user.login;
            const prTitle = context.payload.pull_request.title;

            const body = `
            ## 🎉 Welcome, @${author}! Thank you for your first pull request!

            We're thrilled to have you contribute to **${{ github.repository }}**.
            Your PR — *"${prTitle}"* — is now in the review queue.

            ---

            ### 📚 Before your review, here are some helpful resources:

            | Resource | Link |
            |---|---|
            | 📖 Contributing Guide | [View Guide](${{ env.CONTRIBUTING_GUIDE }}) |
            | ✅ Coding Standards | [View Standards](${{ env.CODING_STANDARDS }}) |
            | 📜 Code of Conduct | [View Code of Conduct](${{ env.CODE_OF_CONDUCT }}) |
            | 📄 Documentation | [View Docs](${{ env.DOCS_URL }}) |

            ---

            ### 💬 Join our community!

            Connect with maintainers and fellow contributors on our
            **[Discord Server](${{ env.DISCORD_INVITE }})** — great place to ask questions,
            share ideas, or just say hi 👋

            ---

            A maintainer will review your PR soon. In the meantime, make sure:
            - [ ] Tests pass locally
            - [ ] Your branch is up-to-date with \`main\`
            - [ ] The PR description explains *what* and *why*

            We appreciate your contribution! 🚀
            `;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
            core.info(`Posted welcome comment on PR #${context.payload.pull_request.number}`);

      - name: Label first-time contributor PR
        if: |
          steps.bot-check.outputs.is_bot == 'false' &&
          steps.check.outputs.is_first_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // FIX: always ensure label exists before applying
            try {
              await github.rest.issues.createLabel({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                name:        'first-contribution',
                color:       '7057ff',
                description: 'First PR from this contributor',
              });
            } catch (err) {
              if (err.status !== 422) core.error(`Label creation error: ${err.message}`);
            }

            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels:       ['first-contribution'],
            });
            core.info('Applied "first-contribution" label');

  # ── Job 2: Welcome First-Time Issue Author ────────────────────────────────
  welcome-new-issue-author:
    name: Welcome First-Time Issue Author
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'issues'

    permissions:
      issues: write

    # FIX: prevents duplicate comments on rapid re-triggers
    concurrency:
      group: welcome-issue-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      # FIX: skip bots
      - name: Skip if author is a bot
        id: bot-check
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            const isBot  = context.payload.issue.user.type === 'Bot'
                        || author.endsWith('[bot]');
            if (isBot) core.warning(`Skipping bot: ${author}`);
            core.setOutput('is_bot', isBot ? 'true' : 'false');

      # FIX: paginate all issues instead of just last 10
      - name: Check if author has filed issues before
        id: check
        if: steps.bot-check.outputs.is_bot == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            let page = 1;
            let realIssueCount = 0;

            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                creator:  author,
                state:    'all',
                per_page: 100,
                page,
              });
              if (issues.length === 0) break;
              // FIX: filter out PRs — GitHub API returns PRs in issue list
              realIssueCount += issues.filter(i => !i.pull_request).length;
              if (issues.length < 100) break;
              page++;
            }

            core.info(`Total issues by @${author}: ${realIssueCount}`);
            core.setOutput('is_first_issue', realIssueCount === 1 ? 'true' : 'false');

      - name: Post first-time issue welcome comment
        if: |
          steps.bot-check.outputs.is_bot == 'false' &&
          steps.check.outputs.is_first_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;

            const body = `
            ## 👋 Welcome, @${author}!

            Thanks for opening your first issue in **${{ github.repository }}**!
            We value every bug report, feature request, and question — it helps us improve.

            ---

            ### 🔍 While you wait for a response, you might find these helpful:

            - 📖 [Contributing Guide](${{ env.CONTRIBUTING_GUIDE }}) — how to get involved
            - 📄 [Documentation](${{ env.DOCS_URL }}) — answers to common questions
            - 🏷️ [Good First Issues](${{ env.GOOD_FIRST_ISSUES }}) — if you'd like to contribute code too!

            ---

            ### 💬 Join our community on [Discord](${{ env.DISCORD_INVITE }})!

            A maintainer will get back to you soon. If this is a bug,
            feel free to add any additional context (logs, screenshots, environment info)
            in the comments below — it speeds up the process a lot!

            Thanks again for being here 🙌
            `;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
            core.info(`Posted welcome comment on issue #${context.payload.issue.number}`);

  # ── Job 3: Welcome New Org Member ─────────────────────────────────────────
  welcome-new-org-member:
    name: Welcome New Org Member
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'repository_dispatch' && github.event.action == 'member_added'

    permissions:
      issues: write

    steps:
      - name: Extract member info from dispatch payload
        id: member
        run: |
          echo "login=${{ github.event.client_payload.member_login }}" >> "$GITHUB_OUTPUT"
          echo "org=${{ github.event.client_payload.organization }}"   >> "$GITHUB_OUTPUT"

      # FIX: ensure onboarding labels exist before trying to apply them
      - name: Ensure onboarding labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'onboarding', color: '006b75', description: 'Onboarding new team member' },
              { name: 'welcome',    color: 'e4e669', description: 'Welcome message'            },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
                core.info(`Created label: "${label.name}"`);
              } catch (err) {
                if (err.status === 422) core.info(`Label "${label.name}" already exists.`);
                else core.error(`Error creating label "${label.name}": ${err.message}`);
              }
            }

      - name: Create personalized welcome issue for new member
        uses: actions/github-script@v7
        with:
          script: |
            const newMember = '${{ steps.member.outputs.login }}';
            const org       = '${{ steps.member.outputs.org }}';

            // FIX: guard against empty payload values
            if (!newMember || !org) {
              core.setFailed('Missing member_login or organization in dispatch payload.');
              return;
            }

            const body = `
            # 🎉 Welcome to the team, @${newMember}!

            We're so excited to have you as a member of **${org}**!

            ---

            ### 🗺️ Your onboarding checklist

            - [ ] Read the [Contributing Guide](${{ env.CONTRIBUTING_GUIDE }})
            - [ ] Review our [Coding Standards](${{ env.CODING_STANDARDS }})
            - [ ] Check out our [Code of Conduct](${{ env.CODE_OF_CONDUCT }})
            - [ ] Explore the [Documentation](${{ env.DOCS_URL }})
            - [ ] Join our [Discord community](${{ env.DISCORD_INVITE }}) and say hi 👋
            - [ ] Pick up a [Good First Issue](${{ env.GOOD_FIRST_ISSUES }}) if you're ready to dive in!

            ---

            ### 📬 Who to reach out to

            If you have questions about the codebase, processes, or anything else,
            drop a message in **#general** on Discord or tag a maintainer in any issue or PR.

            We're glad you're here. Let's build something great together! 🚀
            `;

            await github.rest.issues.create({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              title:     `👋 Welcome to the team, ${newMember}!`,
              body,
              labels:    ['onboarding', 'welcome'],
              assignees: [newMember],
            });
            core.info(`Created welcome issue for @${newMember}`);
