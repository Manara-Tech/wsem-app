# ─────────────────────────────────────────────────────────────────────────────
# PR Contributor Automation Workflow
#
# Handles the full contributor PR lifecycle:
#   1. Draft PR opened      → guide contributor + notify maintainer
#   2. PR ready for review  → update linked issue status labels
#   3. Maintainer assigns   → auto-assign maintainer as reviewer
#
# Fixes applied:
#   - Replaced hardcoded Manara-Tech/wsem-app with ${{ github.repository }}
#   - Added bot filter to skip Dependabot/Renovate
#   - Added concurrency control to prevent duplicate comments
#   - Added timeout-minutes on all jobs
#   - Tightened permissions to minimum required per job
#   - Added guard for empty MAINTAINERS env value
#   - Added error summary reporting on all jobs
#
# Setup:
#   - Update MAINTAINERS below with your real GitHub usernames
#   - No extra secrets needed — uses built-in GITHUB_TOKEN
# ─────────────────────────────────────────────────────────────────────────────

name: 🔄 PR Contributor Automation

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - assigned

env:
  READY_LABEL:        "ready for review"
  READY_LABEL_COLOR:  "0075ca"
  IN_PROGRESS_LABEL:  "in progress"
  DRAFT_LABEL:        "draft"
  DRAFT_LABEL_COLOR:  "d4c5f9"

  # ── Update with your real maintainer GitHub usernames ─────────────────────
  MAINTAINERS: "nohaa3mr"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Handle Draft PR Opened ─────────────────────────────────────────
  handle-draft-pr:
    name: Guide Contributor + Notify Maintainer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      github.event.pull_request.draft == true

    permissions:
      pull-requests: write
      issues:        write

    concurrency:
      group: draft-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Skip if author is a bot
        id: bot-check
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const isBot  = context.payload.pull_request.user.type === 'Bot'
                        || author.endsWith('[bot]')
                        || author === 'dependabot'
                        || author === 'renovate';
            if (isBot) core.warning(`Skipping bot: ${author}`);
            core.setOutput('is_bot', isBot ? 'true' : 'false');

      - name: Ensure draft label exists
        if: steps.bot-check.outputs.is_bot == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.createLabel({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                name:        '${{ env.DRAFT_LABEL }}',
                color:       '${{ env.DRAFT_LABEL_COLOR }}',
                description: 'Work in progress — not ready for review',
              });
            } catch (err) {
              if (err.status !== 422) core.error(`Label error: ${err.message}`);
            }

      - name: Add draft label to PR
        if: steps.bot-check.outputs.is_bot == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels:       ['${{ env.DRAFT_LABEL }}'],
            });

      - name: Post contributor guidance comment
        if: steps.bot-check.outputs.is_bot == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const repo   = '${{ github.repository }}';

            const body = `
            ## 👋 Hi @${author}, thanks for opening this draft PR!

            Your work-in-progress has been noted. Here's what to do next:

            ---

            ### ✅ Before marking as Ready for Review, make sure you:

            - [ ] Described **what** this PR does and **why** in the description
            - [ ] Linked the related issue (e.g. \`Closes #123\`)
            - [ ] Ran and passed all tests locally
            - [ ] Kept your branch up to date with \`main\`
            - [ ] Added an **empty commit** to trigger CI if needed:
              \`\`\`bash
              git commit --allow-empty -m "trigger CI"
              git push
              \`\`\`

            ---

            ### 📋 Contribution Steps

            | Step | Command |
            |---|---|
            | Fork the repo | \`gh repo fork ${repo}\` |
            | Check out your branch | \`git checkout -b your-branch-name\` |
            | Commit (allow empty) | \`git commit --allow-empty -m "your message"\` |
            | Push branch | \`git push origin your-branch-name\` |
            | Open PR | From your fork → base repo |

            ---

            When you're ready, click **"Ready for Review"** and a maintainer will be notified automatically. 🚀
            `;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Notify maintainers about new draft PR
        if: steps.bot-check.outputs.is_bot == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const raw = '${{ env.MAINTAINERS }}'.trim();
            if (!raw) {
              core.warning('MAINTAINERS env is empty — skipping notification.');
              return;
            }
            const maintainers = raw.split(',').map(u => u.trim()).filter(Boolean);
            const author      = context.payload.pull_request.user.login;
            const prUrl       = context.payload.pull_request.html_url;
            const prTitle     = context.payload.pull_request.title;
            const prNum       = context.payload.pull_request.number;
            const mentions    = maintainers.map(m => `@${m}`).join(' ');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: prNum,
              body: `🔔 **New Draft PR by @${author}**\n\n> **${prTitle}**\n\n${mentions} — heads up, PR #${prNum} is open as a draft. No action needed yet.\n\n🔗 ${prUrl}`,
            });

  # ── Job 2: Handle PR Ready for Review ─────────────────────────────────────
  handle-ready-for-review:
    name: Update Linked Issue Status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'ready_for_review' ||
      (github.event.action == 'opened' && github.event.pull_request.draft == false))

    permissions:
      issues:        write
      pull-requests: write

    concurrency:
      group: ready-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Skip if author is a bot
        id: bot-check
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const isBot  = context.payload.pull_request.user.type === 'Bot'
                        || author.endsWith('[bot]')
                        || author === 'dependabot'
                        || author === 'renovate';
            core.setOutput('is_bot', isBot ? 'true' : 'false');

      - name: Extract linked issue number
        id: extract
        if: steps.bot-check.outputs.is_bot == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body     = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;
            const pattern  = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            const matches  = [...body.matchAll(pattern)];

            if (matches.length === 0) {
              core.warning(`No linked issue found in PR #${prNumber}.`);
              core.setOutput('found', 'false');
            } else {
              const issueNumbers = matches.map(m => m[1]);
              core.setOutput('found', 'true');
              core.setOutput('issue_numbers', issueNumbers.join(','));
            }

      - name: Ensure required labels exist
        if: |
          steps.bot-check.outputs.is_bot == 'false' &&
          steps.extract.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: '${{ env.READY_LABEL }}',       color: '${{ env.READY_LABEL_COLOR }}', description: 'PR is ready for review' },
              { name: '${{ env.IN_PROGRESS_LABEL }}', color: 'e4e669',                       description: 'Issue is in progress'    },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, ...label,
                });
              } catch (err) {
                if (err.status !== 422) core.error(`Label error: ${err.message}`);
              }
            }

      - name: Remove draft label from PR
        if: steps.bot-check.outputs.is_bot == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name:         '${{ env.DRAFT_LABEL }}',
              });
            } catch (err) {
              if (err.status !== 404) core.error(`Remove label error: ${err.message}`);
            }

      - name: Update linked issue status labels
        if: |
          steps.bot-check.outputs.is_bot == 'false' &&
          steps.extract.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumbers = '${{ steps.extract.outputs.issue_numbers }}'.split(',');
            const prUrl        = context.payload.pull_request.html_url;
            const errors       = [];

            for (const issueNumber of issueNumbers) {
              const num = parseInt(issueNumber.trim());
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: num,
                });

                if (issue.labels.map(l => l.name).includes('${{ env.IN_PROGRESS_LABEL }}')) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: num, name: '${{ env.IN_PROGRESS_LABEL }}',
                  });
                }

                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: num, labels: ['${{ env.READY_LABEL }}'],
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: num,
                  body: `🔄 **Status Update:** This issue is now **Ready for Review**.\n\n🔗 Linked PR: ${prUrl}`,
                });

                core.info(`✅ Updated issue #${num}`);
              } catch (err) {
                const msg = `Failed to update issue #${num}: ${err.message} (status: ${err.status})`;
                core.error(msg);
                errors.push(msg);
              }
            }

            if (errors.length > 0) {
              core.summary.addHeading('⚠️ Some issues failed to update').addList(errors).write();
              core.setFailed(`${errors.length} issue(s) failed to update.`);
            } else {
              core.summary
                .addHeading('✅ All issues updated')
                .addRaw(`Updated ${issueNumbers.length} issue(s) to "Ready for Review".`)
                .write();
            }

      - name: Log skip — no linked issue
        if: |
          steps.bot-check.outputs.is_bot == 'false' &&
          steps.extract.outputs.found == 'false'
        run: |
          echo "⚠️ No linked issue in PR #${{ github.event.pull_request.number }}."
          echo "Add: Closes #123 | Fixes #123 | Resolves #123"

  # ── Job 3: Auto-Assign Maintainer as Reviewer ─────────────────────────────
  auto-assign-reviewer:
    name: Auto-Assign Maintainer as Reviewer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'assigned'

    permissions:
      pull-requests: write
      issues:        write

    concurrency:
      group: assign-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Assign maintainer as reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const raw = '${{ env.MAINTAINERS }}'.trim();
            if (!raw) {
              core.warning('MAINTAINERS env is empty — skipping.');
              return;
            }

            const maintainers = raw.split(',').map(u => u.trim()).filter(Boolean);
            const prNumber    = context.payload.pull_request.number;
            const assignee    = context.payload.assignee?.login;
            const prAuthor    = context.payload.pull_request.user.login;

            // Never request review from the PR author
            const reviewers = maintainers.filter(m => m !== prAuthor);

            if (reviewers.length === 0) {
              core.warning('No eligible reviewers after filtering out PR author.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                pull_number: prNumber,
                reviewers,
              });

              const mentions = reviewers.map(r => `@${r}`).join(' ');
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                body: `👥 **Reviewer assigned automatically.**\n\n${mentions} has been requested to review this PR.\n@${assignee} is the assigned contributor.`,
              });

              core.info(`✅ Requested review from: ${reviewers.join(', ')}`);
            } catch (err) {
              core.error(`Failed to request reviewers: ${err.message}`);
              core.setFailed(err.message);
            }
